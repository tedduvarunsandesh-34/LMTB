name: Heroku Deployment

on:
  push:
    branches:
      - main  # Deployment triggers only when you push to the main branch

jobs:
  # 1. Build and Test Job
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change to your project's version

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test --if-present

  # 2. Deploy Job (Runs only if Build/Test passes)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # This ensures tests pass before deploying
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          # if your app is a subdirectory, uncomment the line below:
          # appdir: "folder_name" 
          
